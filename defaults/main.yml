# Release name to manage.
helm_gitlab_helm_release_name: gitlab

# Kubernetes namespace where the chart should be installed.
helm_gitlab_helm_release_namespace: gitlab

# Value to pass to chart.
helm_gitlab_helm_release_values:
  global:
    image:
      pullPolicy: IfNotPresent
    edition: ce
    hosts:
      domain: "{{ inventory_hostname }}"
      https: false
      externalIP: "{{ ansible_facts['default_ipv4'].address }}"
      gitlab:
        name: "{{ inventory_hostname }}"
    ingress:
      enabled: true
      class: nginx
      configureCertmanager: false
    minio:
      enabled: true
      image: registry.gitlab.com/gitlab-org/cloud-native/mirror/images/minio/minio
      minioMc:
        image: registry.gitlab.com/gitlab-org/cloud-native/mirror/images/minio/mc
    certificates:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/certificates
        pullPolicy: IfNotPresent
    kubectl:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/kubectl
        pullPolicy: IfNotPresent
    gitlabBase:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-base
        pullPolicy: IfNotPresent
  installCertmanager: false
  nginx-ingress:
    enabled: false
  prometheus:
    install: false
  redis:
    install: true
    image:
      repository: bitnamilegacy/redis
      pullPolicy: IfNotPresent
    metrics:
      enabled: true
      image:
        repository: bitnamilegacy/redis-exporter
        pullPolicy: IfNotPresent
  postgresql:
    install: true 
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
      pullPolicy: IfNotPresent
    primary:
      resources:
        requests:
          cpu: 100m
          memory: 100Mi
    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgres-exporter
        pullPolicy: IfNotPresent
  registry:
    enabled: true
    image:
      repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-container-registry
      pullPolicy: IfNotPresent
    hpa:
      minReplicas: 1
      maxReplicas: 1
  shared-secrets:
    selfsign:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/cfssl-self-sign
        pullPolicy: IfNotPresent
  gitlab-runner:
    install: false
  gitlab:
    gitaly:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitaly
        pullPolicy: IfNotPresent
      replicas: 1
    gitlab-exporter:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-exporter
        pullPolicy: IfNotPresent
    kas:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-kas
        pullPolicy: IfNotPresent
      minReplicas: 1
      maxReplicas: 1
    gitlab-shell:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-shell
        pullPolicy: IfNotPresent
      minReplicas: 1
      maxReplicas: 1
    sidekiq:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-sidekiq-ce
        pullPolicy: IfNotPresent
      minReplicas: 1
      maxReplicas: 1
      resources:
        requests:
          cpu: 450m
          memory: 1G
    toolbox:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-toolbox-ce
        pullPolicy: IfNotPresent
      replicas: 1
    migrations:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-toolbox-ce
        pullPolicy: IfNotPresent
    webservice:
      image:
        repository: registry.gitlab.com/gitlab-org/build/cng/gitlab-webservice-ce
        pullPolicy: IfNotPresent
      workhorse:
        image: registry.gitlab.com/gitlab-org/build/cng/gitlab-workhorse-ce
      minReplicas: 1
      maxReplicas: 1
      resources:
        requests:
          cpu: 150m
          memory: 1G
