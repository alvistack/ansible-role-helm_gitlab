- name: verify | kube_master
  hosts: kube_master
  remote_user: root
  become: true
  tasks:
    - name: kubectl version --output=yaml
      ansible.builtin.command:
        cmd: kubectl version --output=yaml
      register: result
      changed_when: result is not succeeded

    - name: kubectl get pod --all-namespaces
      ansible.builtin.shell:
        cmd: |
          set -euxo pipefail
          kubectl get pod --all-namespaces | egrep -e 'gitlab\s+gitlab-webservice-\S+\s+[0-9]+\/[0-9]+\s+Running'
      args:
        executable: /bin/bash
      when: inventory_hostname == groups['kube_master'][0]
      register: result
      changed_when: result is not succeeded
      until: result is succeeded
      retries: 60

    - name: check port
      ansible.builtin.wait_for:
        port: 80
        timeout: 300
        delay: 10
      async: 300
      poll: 10
      register: result
      until: result is succeeded
      retries: 30

    - name: check page
      ansible.builtin.uri:
        url: http://{{ inventory_hostname }}
        status_code: 200
        timeout: 300
        return_content: true
        validate_certs: false
      async: 300
      poll: 10
      register: result
      until: result.status == 200
      retries: 30

    - name: check result
      ansible.builtin.fail:
      when: "'GitLab' not in result.content"
